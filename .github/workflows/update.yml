name: Update selected Surge startup-ad module

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-startup-ads
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Surge module
        run: python scripts/convert.py

      - name: Apply repository-maintained overrides
        run: python scripts/apply_local_overrides.py

      - name: Validate generated file
        run: |
          test -s dist/StartUpAds_Selected.sgmodule
          grep -q '^#!name=' dist/StartUpAds_Selected.sgmodule
          grep -q '^\[MITM\]' dist/StartUpAds_Selected.sgmodule
          grep -Fq '^https:\/\/pan\.baidu\.com\/act\/api\/activityentry - reject-dict' dist/StartUpAds_Selected.sgmodule
          grep -Fq '^https:\/\/pan\.baidu\.com\/buy\/ad\/conf\?.*type=splashMode - reject-dict' dist/StartUpAds_Selected.sgmodule
          grep -Fq 'ecmob\.cifm\.com\/mall-fundcustom-server\/adinfo\/queryAdInfo' dist/StartUpAds_Selected.sgmodule
          grep -Fq 'scripts/jpmorgan-startup-ad.js' dist/StartUpAds_Selected.sgmodule
          grep -Fq 'ecmob.cifm.com' dist/StartUpAds_Selected.sgmodule

      - name: Commit updated module
        run: |
          if git diff --quiet -- dist/StartUpAds_Selected.sgmodule; then
            echo "No upstream changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/StartUpAds_Selected.sgmodule
          git commit -m "chore: update selected startup-ad module"
          git push
