#!name=开屏广告本地补充
#!desc=补充墨鱼 StartUpAds 当前未覆盖的百度网盘、掌上生活、京东健康、哔哩哔哩开屏/推荐流、广发基金、浦大喜奔、医考帮与摩根资产管理广告规则
#!author=Walvez
#!homepage=https://github.com/Walvez/surge-startup-ads

[rewrite_local]
# 百度网盘：补充 splashMode 开屏配置
^https:\/\/pan\.baidu\.com\/buy\/ad\/conf\?.*type=splashMode url reject-dict

# 掌上生活：开屏预缓存（实机域名为 mbasecc；兼容上游注释中的旧 mlife 路径）
^https:\/\/mbasecc\.bcs\.cmbchina\.com\/Edge\/api\/mlife\.clientface\.clientservice\.api\.advertiseService\/preCacheAdvertiseSec(?:\?|$) url reject-200
^https:\/\/mlife\.cmbchina\.com\/ClientFaceService\/api\/mlife\.clientface\.clientservice\.api\.advertiseService\/preCacheAdvertiseSec(?:\?|$) url reject-200
# 掌上生活：仅拦截实机抓包确认的首页单广告位浮窗接口
^https:\/\/intellicc\.bcs\.cmbchina\.com\/Edge\/api\/mlife\.intelli\.adrender\.api\.AdWork\/getAdsBySlotId(?:\?|$) url reject-200

# 京东健康：仅拦截启动资源接口返回的开屏图（jdh_queryStartupResources）
# 使用宽松 query 匹配；Surge 侧同步改为 Map Local 返回 {}，避免复杂 (?:) 正则/reject-dict 不命中
^https?:\/\/api\.m\.jd\.com\/api\?.*functionId=jdh_queryStartupResources url reject-dict

# 哔哩哔哩：开屏返回完整空结构（show/list/event/brand），避免 reject-dict 的 {} 触发本地缓存续播
^https?:\/\/app\.bili(bili\.com|api\.net)\/x\/v2\/splash\/(brand\/list|event\/list2?|list|show)(?:\?|$) url script-response-body https://raw.githubusercontent.com/Walvez/surge-startup-ads/main/scripts/bilibili-splash-ads.js

# 哔哩哔哩：仅移除推荐信息流创作推广(ad_av)、会员购(ad_web_s)、App Store 大图(ad_web_gif)
^https?:\/\/app\.bili(bili\.com|api\.net)\/x\/v2\/feed\/index(?:\?|$) url script-response-body https://raw.githubusercontent.com/Walvez/surge-startup-ads/main/scripts/bilibili-feed-ads.js

# 广发基金：仅拦截 iOS 开屏图片
^https:\/\/cdngfwx\.gffunds\.com\.cn\/trade-pic\/app\/pic\/[^?]*_(?:kp)?ios\.(?:jpe?g|png|webp)(?:\?.*)?$ url reject

# 浦大喜奔：开屏 JPG 全量 + 开屏/浮窗 PNG 指纹（含实机浮窗 r9XQ2I911、AkoYHETX78630）
# MITM 主机名见下方 image.spdbccc.com.cn / images.spdbccc.com.cn；素材轮换后需清缓存
^https?:\/\/images?\.spdbccc\.com\.cn\/group\d\/M00\/[A-Z0-9]{2}\/[A-Z0-9]{2}\/[^?]+\.(?:[jJ][pP][eE]?[gG])(?:\?.*)?$ url reject-200
^https?:\/\/images?\.spdbccc\.com\.cn\/group\d\/M00\/[A-Z0-9]{2}\/[A-Z0-9]{2}\/.+(?:E798|4038|0571|M511|V-008|g549|b0628|fg817|5w501|Jo341|Z4583|oo845|i4905|MY245|YU472|Y401|w428|s000|r9XQ2I911|AkoYHETX78630)(?:\.[^?\/]+)?(?:\?.*)?$ url reject-200

# 医考帮：删除开屏、启动弹窗、首页浮窗及横幅广告，保留接口结构
^https:\/\/api\.yikaobang\.com\.cn\/index\.php\/client\/[Mm]ain\/(?:startPage|ads)(?:\?|$) url script-response-body https://raw.githubusercontent.com/Walvez/surge-startup-ads/main/scripts/yikaobang-start-page.js

# 摩根资产管理：仅清空原生启动请求返回的开屏广告，保留同接口的首页广告位
^https:\/\/ecmob\.cifm\.com\/mall-fundcustom-server\/adinfo\/queryAdInfo(?:\?|$) url script-response-body https://raw.githubusercontent.com/Walvez/surge-startup-ads/main/scripts/jpmorgan-startup-ad.js

[mitm]
hostname = pan.baidu.com, mbasecc.bcs.cmbchina.com, mlife.cmbchina.com, intellicc.bcs.cmbchina.com, api.m.jd.com, app.bilibili.com, app.biliapi.net, cdngfwx.gffunds.com.cn, image.spdbccc.com.cn, images.spdbccc.com.cn, api.yikaobang.com.cn, ecmob.cifm.com
